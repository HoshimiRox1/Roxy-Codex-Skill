<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>练习题模式模板</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f3f5f8;
      --panel: rgba(255, 255, 255, 0.82);
      --panel-strong: rgba(255, 255, 255, 0.94);
      --text: #1f2937;
      --muted: #5b6678;
      --line: #d3dae6;
      --accent: #2f6fed;
      --accent-soft: #eaf1ff;
      --success: #177245;
      --success-soft: #e9f8ef;
      --danger: #b43b36;
      --danger-soft: #fdeeee;
      --shadow: 0 18px 40px rgba(29, 43, 76, 0.12);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #161a22;
        --panel: rgba(29, 35, 48, 0.88);
        --panel-strong: rgba(24, 29, 40, 0.96);
        --text: #e9eef9;
        --muted: #a7b2c7;
        --line: #394356;
        --accent: #79a7ff;
        --accent-soft: rgba(72, 109, 180, 0.22);
        --success: #6dd69c;
        --success-soft: rgba(39, 102, 68, 0.28);
        --danger: #ff9c95;
        --danger-soft: rgba(130, 56, 56, 0.28);
        --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(74, 118, 201, 0.16), transparent 30%),
        radial-gradient(circle at right 10% top 20%, rgba(36, 163, 143, 0.14), transparent 24%),
        linear-gradient(180deg, var(--bg), var(--bg));
      padding: 32px 20px;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 20px;
      align-items: stretch;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      height: 100%;
    }

    .sidebar {
      padding: 24px;
      position: sticky;
      top: 20px;
      display: flex;
      flex-direction: column;
      align-self: stretch;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    h1 {
      margin: 16px 0 10px;
      font-size: 28px;
      line-height: 1.2;
    }

    .sidebar p,
    .hint,
    .legend,
    .meta,
    .explanation {
      color: var(--muted);
    }

    .sidebar p {
      margin: 0 0 18px;
      line-height: 1.7;
      font-size: 14px;
    }

    .stats {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .stat {
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--panel-strong);
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 800;
    }

    .main {
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-self: stretch;
    }

    .toolbar,
    .footer {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .progress-wrap {
      width: 100%;
      margin: 18px 0 22px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .progress {
      height: 10px;
      width: 100%;
      border-radius: 999px;
      background: rgba(127, 142, 170, 0.18);
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), #5ea0ff);
      transition: width 220ms ease;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel-strong);
      padding: 22px;
    }

    .question-type {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .question-title {
      font-size: 26px;
      line-height: 1.45;
      margin: 0 0 14px;
    }

    .hint {
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .choices {
      display: grid;
      gap: 12px;
    }

    .choice {
      width: 100%;
      text-align: left;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: transparent;
      color: inherit;
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
      font-size: 16px;
      line-height: 1.6;
    }

    .choice:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .choice.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .choice.correct {
      border-color: var(--success);
      background: var(--success-soft);
    }

    .choice.incorrect {
      border-color: var(--danger);
      background: var(--danger-soft);
    }

    .feedback {
      margin-top: 18px;
      border-radius: 20px;
      padding: 16px 18px;
      border: 1px solid transparent;
      display: none;
    }

    .feedback.visible {
      display: block;
    }

    .feedback.correct {
      background: var(--success-soft);
      border-color: rgba(48, 145, 95, 0.28);
    }

    .feedback.incorrect {
      background: var(--danger-soft);
      border-color: rgba(180, 59, 54, 0.24);
    }

    .feedback-title {
      font-weight: 800;
      margin-bottom: 8px;
    }

    .explanation {
      line-height: 1.8;
      font-size: 15px;
    }

    .footer {
      margin-top: 18px;
      gap: 14px;
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 16px;
      background: var(--panel-strong);
      color: inherit;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }

    .btn.primary {
      border-color: transparent;
      background: var(--accent);
      color: #fff;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--muted);
    }

    .legend {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px dashed var(--line);
      font-size: 13px;
      line-height: 1.8;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel sidebar">
      <span class="eyebrow">Practice Mode Template</span>
      <h1>练习题模式样板</h1>
      <p>这个模板用于验证交互式练习题的基本行为是否符合预期：题卡作答、即时反馈、错题解析、正确后推进下一题，以及整体进度与重置能力。</p>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">当前进度</div>
          <div class="stat-value" id="stat-progress">1 / 5</div>
        </div>
        <div class="stat">
          <div class="stat-label">答对题数</div>
          <div class="stat-value" id="stat-correct">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">连续正确</div>
          <div class="stat-value" id="stat-streak">0</div>
        </div>
      </div>

      <div class="legend">
        默认行为：
        <br>
        1. 选项点下后立即判定。
        <br>
        2. 答错时在卡片下方显示解析。
        <br>
        3. 答对时默认 700ms 后自动进入下一题。
      </div>
    </aside>

    <main class="panel main">
      <div class="toolbar">
        <div>
          <div class="eyebrow">Standalone HTML Preview</div>
          <div class="meta" style="margin-top: 10px;">适合桌面预览。若在 Obsidian 内落地，应改为 `dataviewjs` 包裹同等交互逻辑。</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="auto-next" checked>
          答对后自动下一题
        </label>
      </div>

      <div class="progress-wrap">
        <div class="progress-meta">
          <span id="progress-label">第 1 题 / 共 5 题</span>
          <span id="progress-rate">正确率 0%</span>
        </div>
        <div class="progress">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>

      <section class="card">
        <div class="question-type" id="question-type">单选题</div>
        <h2 class="question-title" id="question-title"></h2>
        <div class="hint" id="question-hint"></div>
        <div class="choices" id="choices"></div>

        <div class="feedback" id="feedback">
          <div class="feedback-title" id="feedback-title"></div>
          <div class="explanation" id="feedback-body"></div>
        </div>

        <div class="footer">
          <div class="button-group">
            <button class="btn" id="retry-btn" disabled>重做本题</button>
            <button class="btn" id="show-answer-btn">显示正确答案</button>
          </div>
          <div class="button-group">
            <button class="btn" id="reset-btn">重置练习</button>
            <button class="btn primary" id="next-btn" disabled>下一题</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const questions = [
      {
        type: "单选题",
        title: "如果要做“文章阅读量计数器”，最适合的数据结构是？",
        hint: "重点看哪种结构最适合原子自增。",
        choices: ["Hash", "String", "List", "Set"],
        correctIndex: 1,
        explanation: "计数器最典型的做法是 `String + INCR`。它简单、直接，而且 Redis 对数字字符串的自增支持很成熟。"
      },
      {
        type: "单选题",
        title: "如果用户资料经常只改 `nickname` 或 `avatar` 这样的单个字段，优先考虑哪种结构？",
        hint: "关注“按字段修改”的成本。",
        choices: ["String", "Hash", "List", "Set"],
        correctIndex: 1,
        explanation: "`Hash` 更适合按字段更新。你不需要先把整个对象读出来再整体写回，而是可以直接修改目标字段。"
      },
      {
        type: "判断题",
        title: "`Set` 很适合做共同好友这类能力，因为它天然支持集合运算。",
        hint: "想想交集这个动作。",
        choices: ["对", "错"],
        correctIndex: 0,
        explanation: "共同好友本质上就是交集问题。`Set` 的 `SINTER` 这类操作天然匹配这个需求。"
      },
      {
        type: "单选题",
        title: "如果要求“元素不能重复，同时还要按权重排序”，优先选哪个结构？",
        hint: "既要唯一性，也要排序能力。",
        choices: ["Set", "List", "Hash", "ZSet"],
        correctIndex: 3,
        explanation: "`ZSet` 同时满足成员唯一和按 `score` 排序两个要求，是这类场景的标准选择。"
      },
      {
        type: "单选题",
        title: "为什么 `List` 比 `Set` 更适合做最新评论流？",
        hint: "关注顺序和重复元素。",
        choices: [
          "因为 `List` 自动去重",
          "因为 `List` 保留顺序且允许重复",
          "因为 `List` 自带分数排序",
          "因为 `List` 天生适合字段更新"
        ],
        correctIndex: 1,
        explanation: "评论流首先关心的是顺序，新评论前置和最近 N 条读取都依赖有序序列；`List` 保留顺序，也允许重复元素。"
      }
    ];

    const state = {
      currentIndex: 0,
      selectedIndex: null,
      answered: false,
      completed: false,
      correctCount: 0,
      attempted: 0,
      streak: 0
    };

    const els = {
      questionType: document.getElementById("question-type"),
      questionTitle: document.getElementById("question-title"),
      questionHint: document.getElementById("question-hint"),
      choices: document.getElementById("choices"),
      feedback: document.getElementById("feedback"),
      feedbackTitle: document.getElementById("feedback-title"),
      feedbackBody: document.getElementById("feedback-body"),
      progressLabel: document.getElementById("progress-label"),
      progressRate: document.getElementById("progress-rate"),
      progressBar: document.getElementById("progress-bar"),
      statProgress: document.getElementById("stat-progress"),
      statCorrect: document.getElementById("stat-correct"),
      statStreak: document.getElementById("stat-streak"),
      nextBtn: document.getElementById("next-btn"),
      retryBtn: document.getElementById("retry-btn"),
      resetBtn: document.getElementById("reset-btn"),
      showAnswerBtn: document.getElementById("show-answer-btn"),
      autoNext: document.getElementById("auto-next")
    };

    function currentQuestion() {
      return questions[state.currentIndex];
    }

    function updateStats() {
      const total = questions.length;
      const rate = state.attempted === 0 ? 0 : Math.round((state.correctCount / state.attempted) * 100);
      const progress = state.completed ? total : state.currentIndex + 1;

      els.progressLabel.textContent = state.completed ? `已完成 ${total} / ${total} 题` : `第 ${progress} 题 / 共 ${total} 题`;
      els.progressRate.textContent = `正确率 ${rate}%`;
      els.progressBar.style.width = `${(progress / total) * 100}%`;
      els.statProgress.textContent = state.completed ? `完成` : `${progress} / ${total}`;
      els.statCorrect.textContent = String(state.correctCount);
      els.statStreak.textContent = String(state.streak);
    }

    function renderQuestion() {
      const q = currentQuestion();
      state.completed = false;
      state.selectedIndex = null;
      state.answered = false;

      els.questionType.textContent = q.type;
      els.questionTitle.textContent = q.title;
      els.questionHint.textContent = q.hint;
      els.choices.innerHTML = "";
      els.feedback.className = "feedback";
      els.feedbackTitle.textContent = "";
      els.feedbackBody.textContent = "";
      els.nextBtn.disabled = true;
      els.retryBtn.disabled = true;
      els.nextBtn.textContent = "下一题";
      els.showAnswerBtn.disabled = false;

      q.choices.forEach((choice, index) => {
        const button = document.createElement("button");
        button.className = "choice";
        button.type = "button";
        button.textContent = `${String.fromCharCode(65 + index)}. ${choice}`;
        button.addEventListener("click", () => submitAnswer(index));
        els.choices.appendChild(button);
      });

      updateStats();
    }

    function renderCompletion() {
      const total = questions.length;
      const rate = state.attempted === 0 ? 0 : Math.round((state.correctCount / state.attempted) * 100);
      state.completed = true;
      state.selectedIndex = null;
      state.answered = true;

      els.questionType.textContent = "练习完成";
      els.questionTitle.textContent = "已完成所有题目";
      els.questionHint.textContent = `本轮共完成 ${total} 题，答对 ${state.correctCount} 题，正确率 ${rate}%。可以重置后重新做一遍。`;
      els.choices.innerHTML = "";
      els.feedback.className = "feedback visible correct";
      els.feedbackTitle.textContent = "完成状态";
      els.feedbackBody.textContent = "这里停留在完成页，不再自动回到第一题。若需要继续测试流程，点击“重置练习”重新开始。";
      els.nextBtn.disabled = true;
      els.nextBtn.textContent = "已完成";
      els.retryBtn.disabled = true;
      els.showAnswerBtn.disabled = true;

      updateStats();
    }

    function markChoices(correctIndex, selectedIndex) {
      [...els.choices.children].forEach((button, index) => {
        button.disabled = true;
        button.classList.remove("selected", "correct", "incorrect");

        if (index === selectedIndex) {
          button.classList.add("selected");
        }
        if (index === correctIndex) {
          button.classList.add("correct");
        } else if (index === selectedIndex && selectedIndex !== correctIndex) {
          button.classList.add("incorrect");
        }
      });
    }

    function submitAnswer(index) {
      if (state.answered) {
        return;
      }

      const q = currentQuestion();
      state.selectedIndex = index;
      state.answered = true;
      state.attempted += 1;

      const isCorrect = index === q.correctIndex;
      if (isCorrect) {
        state.correctCount += 1;
        state.streak += 1;
      } else {
        state.streak = 0;
      }

      markChoices(q.correctIndex, index);

      els.feedback.className = `feedback visible ${isCorrect ? "correct" : "incorrect"}`;
      els.feedbackTitle.textContent = isCorrect ? "回答正确" : "回答不正确";
      els.feedbackBody.textContent = q.explanation;
      els.nextBtn.disabled = false;
      els.retryBtn.disabled = false;
      updateStats();

      if (isCorrect && els.autoNext.checked) {
        window.setTimeout(() => {
          if (state.answered) {
            nextQuestion();
          }
        }, 700);
      }
    }

    function revealAnswer() {
      if (state.answered) {
        return;
      }

      const q = currentQuestion();
      state.answered = true;
      state.streak = 0;
      markChoices(q.correctIndex, q.correctIndex);
      els.feedback.className = "feedback visible correct";
      els.feedbackTitle.textContent = "已显示参考答案";
      els.feedbackBody.textContent = q.explanation;
      els.nextBtn.disabled = false;
      els.retryBtn.disabled = false;
      updateStats();
    }

    function retryQuestion() {
      renderQuestion();
    }

    function nextQuestion() {
      if (state.currentIndex >= questions.length - 1) {
        renderCompletion();
        return;
      }

      state.currentIndex += 1;
      renderQuestion();
    }

    function resetAll() {
      state.currentIndex = 0;
      state.selectedIndex = null;
      state.answered = false;
      state.completed = false;
      state.correctCount = 0;
      state.attempted = 0;
      state.streak = 0;
      renderQuestion();
    }

    els.nextBtn.addEventListener("click", nextQuestion);
    els.retryBtn.addEventListener("click", retryQuestion);
    els.resetBtn.addEventListener("click", resetAll);
    els.showAnswerBtn.addEventListener("click", revealAnswer);

    renderQuestion();
  </script>
</body>
</html>
